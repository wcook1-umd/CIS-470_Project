<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js" integrity="sha512-vc58qvvBdrDR4etbxMdlTt4GBQk1qjvyORR2nrsPsFPyrs+/u5c3+1Ct6upOgdZoIl7eq6k3a1UPDSNAQi/32A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>Brainfuck Interpreter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 18px;
            height: 100vh;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        svg{
            border: 1px solid black;
        }
        
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col text-center">
        <h1>Brainfuck Interpreter</h1>
        </div>
    </row>
    <div class="row">
        <div class="col-md-6"><br><br><br>
            <form id="codeForm">
                <label for="code" class="form-check-label">Code:</label>
                <input id="code" name="code" class="form-control" required>
            </form>
        </div>
        <div class="col-md-6">
            <form id="otherStuffForm">
                <label for="input" class="form-check-label">Input:</label>
                <input id="input" name="input" class="form-control" required>
                <br>
                <button type="submit" class="btn btn-primary">Run Code</button>
                <br>
                <label for="output" class="form-check-label">Output:</label>
                <input id="output" name="output" class="form-control" required readonly>
            </form>
        </div>
    </div>
</div>
    <script>
        document.getElementById('triangleForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const code = document.getElementById('code').value;
            const input = document.getElementById('input').value;

            fetch('/interpret', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code, input })
            })
            .then(response => response.json())
            .then(data => {
                const outputBox = document.getElementById('output');
                console.log(data);
                outputBox.value = data.result;
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
        
    </script>
</body>
</html>
